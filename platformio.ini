; Waveshare ESP32-S3-Touch-LCD-1.28
; Display: 240x240 GC9A01A (SPI), Touch: CST816S (I2C), IMU: QMI8658
; MCU: ESP32-S3R2, 16MB Flash, 2MB embedded PSRAM (quad/QSPI, not OPI)

[env:waveshare_esp32s3_lcd128]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; ── Flash / PSRAM layout ──────────────────────────────────────────────────────
board_build.flash_size = 16MB
board_build.flash_mode = qio
board_build.arduino.memory_type = qio_qspi   ; 2MB embedded PSRAM on ESP32-S3R2

; ── Upload & monitor ─────────────────────────────────────────────────────────
; Board uses CH343P USB-UART chip (not native USB)
upload_port = /dev/ttyACM1
monitor_port = /dev/ttyACM1
upload_speed = 921600
monitor_speed = 115200

; ── Build flags ───────────────────────────────────────────────────────────────
build_flags =
    -DUSER_SETUP_LOADED=1
    -include include/User_Setup.h
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=0          ; CH343P is UART, not native USB CDC
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DCORE_DEBUG_LEVEL=0          ; suppress ESP-IDF debug output
    -DFPS_MONITOR=1               ; print FPS to serial monitor
    -mfix-esp32-psram-cache-issue
    -std=gnu++17

; ── External libraries ────────────────────────────────────────────────────────
lib_deps =
    bodmer/TFT_eSPI               ; display rendering + sprites
